<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFC8DD" />
  <title>Borrowable</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FFF7ED',
            pastel: {
              pink: '#FFC8DD', rose: '#FFAFCC', peach: '#FFD6A5',
              butter: '#FDFFB6', mint: '#CAFFBF', sky: '#A0E7E5',
              lilac: '#CDB4DB', lavender: '#BDB2FF', coral: '#FFADAD',
            },
            status: {
              ok: '#B8F2C9', okDeep: '#7FD89C',
              warn: '#FFE08A', warnDeep: '#F7C035',
              due: '#FFB4A2', dueDeep: '#FF6B6B',
              done: '#D3D3F2', doneDeep: '#7C7CC7',
            },
          },
          boxShadow: {
            bubble: '0 10px 30px -10px rgba(0,0,0,0.18), inset 0 -6px 0 rgba(0,0,0,0.06)',
            pop: '0 6px 0 rgba(0,0,0,0.08), 0 14px 30px -8px rgba(0,0,0,0.18)',
            soft: '0 8px 24px -8px rgba(0,0,0,0.18)',
          },
        },
      },
    }
  </script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: 'Quicksand', system-ui, sans-serif;
      color: #3a2f4a;
      background:
        radial-gradient(circle at 10% 0%, #FFC8DD 0%, transparent 38%),
        radial-gradient(circle at 92% 8%, #BDB2FF 0%, transparent 36%),
        radial-gradient(circle at 0% 90%, #CAFFBF 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, #A0E7E5 0%, transparent 42%),
        #FFF7ED;
      background-attachment: fixed;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-family: 'Fredoka', 'Quicksand', system-ui, sans-serif; letter-spacing: -0.01em; }
    .blob   { border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%; }
    .squish { border-radius: 60% 40% 50% 50% / 45% 55% 45% 55%; }
    .card-bubble {
      border-radius: 2.5rem;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.18), inset 0 -6px 0 rgba(0,0,0,0.06);
      border: 2px solid rgba(255,255,255,0.8);
    }
    .btn-pop {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      border-radius: 9999px; padding: 0.75rem 1.5rem; font-weight: 600;
      box-shadow: 0 6px 0 rgba(0,0,0,0.08), 0 14px 30px -8px rgba(0,0,0,0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer; border: 0; font-family: inherit; font-size: 1rem;
    }
    .btn-pop:hover { transform: translateY(-2px); }
    .btn-pop:active { transform: translateY(2px); box-shadow: 0 8px 24px -8px rgba(0,0,0,0.18); }
    .btn-pop:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: #FFAFCC; color: white; }
    .btn-secondary { background: white; color: #CDB4DB; border: 2px solid #CDB4DB; }
    .btn-mint { background: #CAFFBF; color: #064E3B; }
    .btn-sky { background: #A0E7E5; color: #164E63; }
    .btn-coral { background: #FFADAD; color: #881337; }
    .input-bubble {
      width: 100%; border-radius: 1rem; border: 2px solid white;
      background: rgba(255,255,255,0.8); padding: 0.75rem 1rem; font-size: 1rem;
      outline: none; transition: all 0.15s; box-shadow: 0 8px 24px -8px rgba(0,0,0,0.18);
      font-family: inherit; color: #3a2f4a;
    }
    .input-bubble::placeholder { color: rgba(205, 180, 219, 0.7); }
    .input-bubble:focus { border-color: #CDB4DB; background: white; }
    .label-soft { font-size: 0.875rem; font-weight: 600; color: #CDB4DB; text-transform: uppercase; letter-spacing: 0.08em; }

    @keyframes bob { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-6px) rotate(1deg); } }
    @keyframes wiggle { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
    @keyframes pulseSoft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.06); opacity: 1; } 100% { transform: scale(1); } }
    .anim-bob { animation: bob 5s ease-in-out infinite; }
    .anim-wiggle { animation: wiggle 1.4s ease-in-out infinite; }
    .anim-pulse-soft { animation: pulseSoft 2.4s ease-in-out infinite; }
    .anim-pop { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    .toggle-pill { display: flex; background: rgba(255,255,255,0.6); border-radius: 9999px; padding: 4px; box-shadow: 0 8px 24px -8px rgba(0,0,0,0.18); }
    .toggle-pill button { border: 0; background: transparent; padding: 0.375rem 1rem; border-radius: 9999px; font-weight: 700; color: #CDB4DB; cursor: pointer; font-family: inherit; font-size: 0.875rem; }
    .toggle-pill button.active { background: #FFAFCC; color: white; box-shadow: 0 8px 24px -8px rgba(0,0,0,0.18); }
    .toggle-pill.lavender button.active { background: #BDB2FF; }

    .modal-backdrop { position: fixed; inset: 0; z-index: 50; display: flex; align-items: flex-end; justify-content: center; background: rgba(40,30,50,0.4); backdrop-filter: blur(4px); padding: 0; overflow-y: auto; }
    @media (min-width: 640px) { .modal-backdrop { align-items: center; padding: 1rem; } }
    .modal-card { width: 100%; max-width: 36rem; background: rgba(255,255,255,0.95); max-height: 100vh; overflow-y: auto; border-radius: 2.5rem 2.5rem 0 0; }
    @media (min-width: 640px) { .modal-card { max-height: 92vh; border-radius: 2.5rem; } }

    .ring-status { box-shadow: 0 0 0 4px var(--ring-color, transparent), 0 10px 30px -10px rgba(0,0,0,0.18), inset 0 -6px 0 rgba(0,0,0,0.06); }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* ─── ITEM CARDS — soft rounded squircle so text fits, alive animations ─── */
    .item-card {
      border-radius: 1.75rem 2.25rem 2rem 2.5rem;
      cursor: pointer;
      border: 0;
      font-family: inherit;
      color: inherit;
      transform-origin: center;
      animation:
        cardEnter 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both var(--enter-delay, 0s),
        cardIdle 5.5s ease-in-out infinite var(--idle-delay, 0s);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      will-change: transform;
    }
    .item-card:hover {
      transform: translateY(-8px) rotate(-2.5deg) scale(1.04) !important;
      animation-play-state: paused;
      box-shadow: 0 0 0 4px var(--ring-color, transparent), 0 22px 40px -10px rgba(0,0,0,0.25), inset 0 -6px 0 rgba(0,0,0,0.08);
    }
    .item-card:active {
      transform: translateY(2px) rotate(-1deg) scale(0.97) !important;
      transition: transform 0.08s ease-out;
    }
    @keyframes cardEnter {
      0% { transform: scale(0.6) rotate(-12deg); opacity: 0; }
      55% { transform: scale(1.08) rotate(3deg); opacity: 1; }
      80% { transform: scale(0.97) rotate(-1deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    @keyframes cardIdle {
      0%, 100% { transform: translateY(0) rotate(-0.6deg); }
      50%      { transform: translateY(-5px) rotate(0.6deg); }
    }

    /* ─── PERSON CARDS — softer asymmetric rounded ─── */
    .person-card {
      border-radius: 2rem 2.5rem 2.5rem 2rem;
      text-decoration: none;
      color: inherit;
      animation:
        cardEnter 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both var(--enter-delay, 0s),
        personIdle 6.5s ease-in-out infinite var(--idle-delay, 0s);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      will-change: transform;
    }
    .person-card:hover {
      transform: translateY(-7px) rotate(2deg) scale(1.04) !important;
      animation-play-state: paused;
    }
    .person-card:active {
      transform: translateY(2px) scale(0.98) !important;
      transition: transform 0.08s ease-out;
    }
    @keyframes personIdle {
      0%, 100% { transform: translateY(0) rotate(0.6deg); }
      50%      { transform: translateY(-4px) rotate(-0.6deg); }
    }

    /* ─── BUTTONS — pop a bit harder ─── */
    .btn-pop { transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease; }
    .btn-pop:hover { transform: translateY(-3px) rotate(-1deg) scale(1.03); }
    .btn-pop:active { transform: translateY(3px) scale(0.97); }

    /* ─── ATTENTION PULSE for the main CTA ─── */
    @keyframes attentionPulse {
      0%, 88%, 100% { transform: scale(1) rotate(0); }
      90%           { transform: scale(1.06) rotate(-2deg); }
      94%           { transform: scale(0.98) rotate(2deg); }
      97%           { transform: scale(1.03) rotate(-1deg); }
    }
    .anim-attention { animation: attentionPulse 5s ease-in-out infinite; }
    .anim-attention:hover { animation-play-state: paused; }

    /* ─── LOGO WIGGLE on group hover ─── */
    .logo-blob { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .logo-link:hover .logo-blob { animation: wiggle 0.5s ease-in-out 2; }
    .logo-link:hover h1 { animation: wiggle 0.6s ease-in-out 1; }

    /* ─── HEADER COUNT — bounces in ─── */
    @keyframes countPop {
      0% { transform: scale(0.4) rotate(-8deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(4deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); }
    }
    .anim-count-pop { animation: countPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; display: inline-block; }

    /* ─── BACKGROUND SPARKLES — drift up and fade ─── */
    .ambient-layer {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .spark {
      position: absolute; bottom: -40px; font-size: 1.2rem; opacity: 0;
      animation: sparkRise var(--dur, 14s) linear infinite;
      animation-delay: var(--delay, 0s);
      will-change: transform, opacity;
    }
    @keyframes sparkRise {
      0%   { transform: translate(0, 0) rotate(0deg) scale(0.6); opacity: 0; }
      10%  { opacity: 0.85; }
      50%  { transform: translate(var(--drift, 30px), -50vh) rotate(180deg) scale(1); }
      90%  { opacity: 0.85; }
      100% { transform: translate(calc(var(--drift, 30px) * -0.5), -110vh) rotate(360deg) scale(0.6); opacity: 0; }
    }

    /* ─── CONFETTI on Returned ─── */
    @keyframes confettiFly {
      0%   { transform: translate(-50%, -50%) scale(0.3) rotate(0deg); opacity: 0; }
      15%  { transform: translate(-50%, -50%) scale(1.1) rotate(40deg); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, 0px))) scale(0.4) rotate(540deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed; pointer-events: none; will-change: transform, opacity;
      animation: confettiFly var(--dur, 1.2s) cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }

    /* ─── BREATHING shadow on hero card ─── */
    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }

    /* ─── SUCCESS POP — short flash for status changes ─── */
    @keyframes successPop {
      0%   { transform: scale(0.6); opacity: 0; }
      50%  { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ─── prefers-reduced-motion: respect user setting ─── */
    @media (prefers-reduced-motion: reduce) {
      .item-card, .person-card { animation: none !important; }
      .anim-bob, .anim-wiggle, .anim-pulse-soft, .anim-attention, .anim-breathe, .spark { animation: none !important; }
      .item-card:hover, .person-card:hover { transform: translateY(-2px) !important; }
    }
  </style>
</head>
<body>
  <div class="ambient-layer" aria-hidden="true">
    <span class="spark" style="left:6%;  --dur:18s; --delay:0s;   --drift:40px;">✨</span>
    <span class="spark" style="left:18%; --dur:22s; --delay:3s;   --drift:-30px;">💖</span>
    <span class="spark" style="left:32%; --dur:16s; --delay:6s;   --drift:50px;">🌸</span>
    <span class="spark" style="left:48%; --dur:24s; --delay:1.5s; --drift:-40px;">⭐</span>
    <span class="spark" style="left:62%; --dur:19s; --delay:8s;   --drift:35px;">✨</span>
    <span class="spark" style="left:75%; --dur:21s; --delay:4s;   --drift:-50px;">💫</span>
    <span class="spark" style="left:88%; --dur:17s; --delay:10s;  --drift:25px;">🌷</span>
    <span class="spark" style="left:95%; --dur:23s; --delay:13s;  --drift:-35px;">💖</span>
  </div>
  <div id="root" style="position:relative; z-index:1;">
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
      <div class="anim-pulse-soft" style="width:64px; height:64px; background:#FFAFCC; border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.18), inset 0 -6px 0 rgba(0,0,0,0.06);"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
